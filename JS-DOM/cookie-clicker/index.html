<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>The Powerpuff Girls Clicker Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="dashboard">
      <div class="column main-col">
        <h1 class="title-img">
          <img src="pp-logo.png" alt="The Powerpuff Girls" />
        </h1>
        <div class="target-container">
          <button id="clickButton" class="target-btn">
            <img src="power-btn.png" alt="Powerpuff Girls" />
          </button>
        </div>
        <div class="main-top">
          <div class="progress-section">
            <h2>Chemical X Energy</h2>
            <h1 id="scoreDisplay">0</h1>
          </div>

          <div class="stats-row">
            <p>Auto Power: <span id="rateDisplay">0</span> / sec</p>
            <p>|</p>
            <p>Power: <span id="clickPowerDisplay">1</span></p>
          </div>
        </div>
      </div>

      <div class="column right-col">
        <h2>Team Upgrades</h2>

        <button id="buyUpgrade1" class="upgrade-btn">
          <div class="upgrade-info">
            <strong>Chemical X Boost</strong>
            <p>+1 power per click</p>
          </div>
          <div class="upgrade-cost"><span id="cost1">20</span> energy</div>
        </button>

        <button id="buyUpgrade2" class="upgrade-btn">
          <div class="upgrade-info">
            <strong>Blossom’s Leadership</strong>
            <p>+1 power per second</p>
          </div>
          <div class="upgrade-cost"><span id="cost2">65</span> energy</div>
        </button>

        <button id="buyUpgrade3" class="upgrade-btn">
          <div class="upgrade-info">
            <strong>Bubbles’ Joy</strong>
            <p>+5 power per second</p>
          </div>
          <div class="upgrade-cost"><span id="cost3">200</span> energy</div>
        </button>

        <button id="buyUpgrade4" class="upgrade-btn">
          <div class="upgrade-info">
            <strong>Buttercup’s Strength</strong>
            <p>+20 power per second</p>
          </div>
          <div class="upgrade-cost"><span id="cost4">800</span> energy</div>
        </button>

        <button id="buyUpgrade5" class="upgrade-btn">
          <div class="upgrade-info">
            <strong>Professor Utonium’s Lab</strong>
            <p>+100 power per second</p>
          </div>
          <div class="upgrade-cost"><span id="cost5">2500</span> energy</div>
        </button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
