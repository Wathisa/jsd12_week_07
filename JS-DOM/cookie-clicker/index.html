<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magical Girls Alliance</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="dashboard">
      <div class="column left-col">
        <div class="progress-section">
          <h2>✨ พลังเวทแห่งจักรวาล ✨</h2>
          <h1 id="scoreDisplay">0</h1>
          <p>อัตราการผลิต: <span id="rateDisplay">0</span> / วินาที</p>
        </div>

        <div class="target-container">
          <button id="clickButton" class="target-btn">
            <strong>คทาจันทร์เสี้ยว</strong><br />
            (คลิกร่ายมนต์!)
          </button>
        </div>
      </div>

      <div class="column middle-col">
        <h2>สมาพันธ์สาวน้อยเวทมนตร์</h2>
        <div class="status-box">
          <p>พลังเวทต่อการร่ายมนต์ 1 ครั้ง</p>
          <h3 id="clickPowerDisplay">1 หน่วย / คลิก</h3>
        </div>
      </div>

      <div class="column right-col">
        <h2>อัปเกรดพลัง</h2>

        <button id="buyUpgrade1" class="upgrade-btn">
          <div class="upgrade-info">
            <strong>1. สารเคมี X (Powerpuff)</strong>
            <p>+1 พลังร่ายมนต์ (ต่อคลิก)</p>
          </div>
          <div class="upgrade-cost">
            ใช้: <span id="cost1">20</span> พลังเวท
          </div>
        </button>

        <button id="buyUpgrade2" class="upgrade-btn">
          <div class="upgrade-info">
            <strong>2. เคโระจังหิวขนม (Sakura)</strong>
            <p>+1 ออโต้ / วินาที</p>
          </div>
          <div class="upgrade-cost">
            ใช้: <span id="cost2">65</span> พลังเวท
          </div>
        </button>

        <button id="buyUpgrade3" class="upgrade-btn">
          <div class="upgrade-info">
            <strong>3. แมวลูน่าช่วยจำ (Sailor Moon)</strong>
            <p>+5 ออโต้ / วินาที</p>
          </div>
          <div class="upgrade-cost">
            ใช้: <span id="cost3">200</span> พลังเวท
          </div>
        </button>

        <button id="buyUpgrade4" class="upgrade-btn">
          <div class="upgrade-info">
            <strong>4. โมโจ โจโจ้ (โดนบังคับช่วย)</strong>
            <p>+20 ออโต้ / วินาที</p>
          </div>
          <div class="upgrade-cost">
            ใช้: <span id="cost4">800</span> พลังเวท
          </div>
        </button>

        <button id="buyUpgrade5" class="upgrade-btn">
          <div class="upgrade-info">
            <strong>5. พลังมิตรภาพทะลุมิติ!</strong>
            <p>+100 ออโต้ / วินาที</p>
          </div>
          <div class="upgrade-cost">
            ใช้: <span id="cost5">2500</span> พลังเวท
          </div>
        </button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
